version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ticket_booking_db
    environment:
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_password
      POSTGRES_DB: ticket_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_user -d ticket_booking"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticket_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket_booking_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ticket_user:ticket_password@postgres:5432/ticket_booking
      APP_NAME: Ticket Booking System
      APP_VERSION: 0.1.0
      DEBUG: "True"
      HOLD_EXPIRY_MINUTES: 5
      SCHEDULER_ENABLED: "True"
      SCHEDULER_HOLD_CLEANUP_INTERVAL_SECONDS: 60
    ports:
      - "8000:8000"
    networks:
      - ticket_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:

networks:
  ticket_network:
    driver: bridge
